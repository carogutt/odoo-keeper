name: Weekly Odoo Check

on:
  schedule:
    - cron: '0 9 * * 1' # lunes 9am
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install deps
        run: |
          npm install
          npx playwright install --with-deps

      - name: Run script
        run: node test.js